<!DOCTYPE html>
<html>
<head>
  <title>File Browser</title>
</head>
<body>
  <h2>Files</h2>
  <ul id="files"></ul>

  <script>
    fetch("https://api.github.com/repos/solarpertamina/iconx/contents/")
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById("files");
        data.forEach(file => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = file.name;
          a.textContent = file.name;
          li.appendChild(a);
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
